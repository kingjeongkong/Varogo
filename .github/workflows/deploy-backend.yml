name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/Varogo
            git fetch origin main
            git reset --hard origin/main

            RUNNING_IMAGE=$(docker inspect --format='{{.Image}}' varogo-backend 2>/dev/null || true)
            if [ -n "$RUNNING_IMAGE" ]; then
              docker tag "$RUNNING_IMAGE" varogo-backend:previous
            fi

            if ! docker build -t varogo-backend -f apps/backend/Dockerfile .; then
              echo "::error::Docker build failed — no container swap performed. Previous container still running. To manually recover: docker run ... varogo-backend:previous"
              exit 1
            fi

            if ! docker run --rm --env-file apps/backend/.env varogo-backend alembic upgrade head; then
              echo "::error::alembic upgrade head failed — no container swap performed. Previous container still running. To manually recover: docker run ... varogo-backend:previous"
              exit 1
            fi

            # Migration succeeded — no rollback beyond this point
            docker rm -f varogo-backend || true
            docker run -d --name varogo-backend --restart unless-stopped --env-file apps/backend/.env -p 127.0.0.1:3000:3000 varogo-backend

            echo "Waiting for server to be ready..."
            for i in $(seq 1 30); do
              if curl -sf --max-time 3 http://localhost:3000/health; then
                echo "Server is ready."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "::error::Health check failed after 30 attempts — migration already applied so no rollback. Server is down."
                docker logs varogo-backend --tail 30
                exit 1
              fi
              sleep 2
            done

            docker system prune -f
