name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/Varogo
            git fetch origin main
            git reset --hard origin/main

            docker tag varogo-backend varogo-backend:previous 2>/dev/null || true

            if ! docker build -t varogo-backend -f apps/backend/Dockerfile .; then
              echo "::error::Docker build failed — no container swap performed. Previous container still running. To manually recover: docker run ... varogo-backend:previous"
              exit 1
            fi

            if ! docker run --rm --env-file apps/backend/.env varogo-backend alembic upgrade head; then
              echo "::error::alembic upgrade head failed — no container swap performed. Previous container still running. To manually recover: docker run ... varogo-backend:previous"
              exit 1
            fi

            # Migration succeeded — no rollback beyond this point
            docker rm -f varogo-backend || true
            docker run -d --name varogo-backend --restart unless-stopped --env-file apps/backend/.env -p 127.0.0.1:3000:3000 varogo-backend

            if ! curl -f --retry 15 --retry-delay 2 --retry-connrefused --max-time 5 http://localhost:3000/health; then
              echo "::error::Health check failed — migration already applied so no rollback. Server is down."
              docker logs varogo-backend --tail 30
              exit 1
            fi

            docker system prune -f
