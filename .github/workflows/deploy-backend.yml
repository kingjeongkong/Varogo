name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Varogo
            git pull origin main
            docker build -t varogo-backend -f apps/backend/Dockerfile .
            docker run --rm -w /app/apps/backend --env-file apps/backend/.env varogo-backend npx prisma migrate deploy
            docker rm -f varogo-backend || true
            docker run -d --name varogo-backend --restart unless-stopped --env-file apps/backend/.env -p 80:3000 varogo-backend
            sleep 10
            curl -f http://localhost/health || (echo "Health check failed:" && docker logs varogo-backend --tail 30 && exit 1)
            docker system prune -f
