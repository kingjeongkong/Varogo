services:
  postgres:
    image: postgres:17-alpine
    container_name: varogo_postgres
    environment:
      POSTGRES_USER: varogo
      POSTGRES_PASSWORD: varogo_password
      POSTGRES_DB: varogo_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: varogo_backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://varogo:varogo_password@postgres:5432/varogo_db?schema=public
      NODE_ENV: development
    depends_on:
      - postgres
    volumes:
      - ./apps/backend:/app
      - /app/node_modules

volumes:
  postgres_data:
